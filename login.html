<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Yasmin & Aliarose Dormitory</title>
    
    <!-- External Assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Project Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/state.js"></script>
    <style>
        .split-login { display: flex; min-height: 100vh; width: 100%; font-family: 'Inter', sans-serif; }
        .login-brand { flex: 1.1; background: var(--primary); display: flex; align-items: center; justify-content: center; padding: 4rem; color: #fff; position: relative; overflow: hidden; }
        .decoration-circle { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); background: radial-gradient(circle, rgba(255,255,255,0.1), transparent); }
        .dc-1 { width: 600px; height: 600px; top: -200px; left: -200px; }
        .dc-2 { width: 400px; height: 400px; bottom: -100px; right: -150px; opacity: 0.6; }
        .login-form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem; background: #fff; }
        .login-box { width: 100%; max-width: 420px; margin: 0 auto; }
        .logo-circle { width: 110px; height: 110px; background: #fff; border-radius: 2.5rem; position: relative; display: flex; align-items: center; justify-content: center; margin: 0 auto 3rem; transform: rotate(-5deg); }
        .logo-stack-large i { font-size: 3.2rem; color: var(--primary); }
        .error-alert { background: #fee2e2; color: #991b1b; padding: 1.25rem; border-radius: 1rem; margin-bottom: 2rem; font-size: 0.9rem; display: none; align-items: center; gap: 0.75rem; border: 1px solid #fecaca; }
        @media (max-width: 900px) { 
            .split-login { flex-direction: column; } 
            .login-brand { min-height: 40vh; padding: 3rem 1.5rem; } 
            .login-form-side { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="split-login">
    <div class="login-brand">
        <div class="decoration-circle dc-1"></div>
        <div class="decoration-circle dc-2"></div>
        <div style="position: relative; z-index: 5; text-align: center;">
            <div class="logo-circle shadow-xl">
                <i class="fas fa-hotel" style="font-size: 3rem; color: var(--primary);"></i>
            </div>
            <h1 id="siteNameDisplay" class="text-5xl font-black mb-4 tracking-tighter">Yasmin & Aliarose Dormitory</h1>
            <p class="text-lg opacity-80 max-w-400 font-medium">Verified Administrative Management System.</p>
        </div>
    </div>

    <div class="login-form-side">
        <div class="login-box">
            <div class="text-center" style="margin-bottom: 3.5rem;">
                <h2 class="text-4xl font-black text-slate-800 tracking-tight mb-2">Admin Security</h2>
                <p class="text-secondary text-sm font-medium opacity-80">Secure portal for Netlify Demo</p>
            </div>

            <div id="loginError" class="error-alert">
                <i class="fas fa-exclamation-triangle"></i> Invalid username or password
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group mb-6">
                    <label>Admin Username</label>
                    <div class="input-container">
                        <input type="text" id="username" required placeholder="Enter username" style="height: 3.5rem;">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group mb-8">
                    <label>Security Password</label>
                    <div class="input-container">
                        <input type="password" id="password" required placeholder="•••••" style="height: 3.5rem;">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="height: 3.75rem; font-size: 1.1rem;">Sign In to Dashboard <i class="fas fa-sign-in-alt" style="margin-left: 0.75rem;"></i></button>
            </form>
            
            <div class="text-center" style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid #f1f5f9;">
                <a href="index.html" class="text-secondary font-bold text-xs uppercase tracking-[0.2em] hover:text-emerald-600 transition-all flex items-center justify-center gap-3" style="text-decoration: none;">
                    <i class="fas fa-arrow-left" style="font-size: 0.85rem;"></i> Return to Main Website
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    try {
        if (DormState && DormState.data && DormState.data.settings) {
            document.getElementById('siteNameDisplay').textContent = DormState.data.settings.site_name;
        }
    } catch (e) {
        console.error("DormState load failed", e);
    }

    function handleLogin(e) {
        e.preventDefault();
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();
        const errorEl = document.getElementById('loginError');

        console.log("Login attempt:", user, "Password provided.");

        // Dynamic Logic (Using state.js)
        const adminData = DormState.data.admin || { username: 'admin', password: '123' };
        
        if (user === adminData.username && pass === adminData.password) {
            console.log("Login successful! Redirecting...");
            localStorage.setItem('dorm_admin_logged_in', 'true');
            localStorage.setItem('dorm_admin_user', user);
            window.location.href = 'admin/dashboard.html';
        } else {
            console.warn("Login failed: Invalid credentials.");
            errorEl.style.display = 'flex';
            setTimeout(() => errorEl.style.display = 'none', 3000);
        }
    }

    // Check if already logged in
    try {
        if (localStorage.getItem('dorm_admin_logged_in') === 'true') {
            window.location.href = 'admin/dashboard.html';
        }
    } catch (e) {}
</script>

</body>
</html>
